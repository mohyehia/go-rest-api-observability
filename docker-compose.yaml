services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      - "3000:3000"     # Grafana
      - "9090:9090"     # Prometheus
      - "3100:3100"     # Loki
      - "3200:3200"     # Tempo
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Crucial: Enables Prometheus to receive metrics from Tempo
      - PROMETHEUS_ARGS=--web.enable-remote-write-receiver --enable-feature=exemplar-storage
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./docker/otel-volume/prometheus/prometheus.yaml:/otel-lgtm/prometheus.yaml