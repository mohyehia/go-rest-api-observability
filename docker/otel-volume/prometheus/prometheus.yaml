global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'rest-api-observability'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'host.docker.internal:9091' ]

  - job_name: 'tempo'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'localhost:3200' ]

  - job_name: 'loki'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'localhost:3100' ]